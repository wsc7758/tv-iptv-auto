name IPTV自动更新
on:
  workflow_dispatch:  # 支持页面手动点运行，不用等定时
  schedule:
    # UTC时间，对应北京时间 早上6点 / 傍晚18点 每日两次更新
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'

jobs:
  run_filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许提交修改后的tv.txt
    steps:
      - name: 拉取仓库全部代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python与依赖库
        run: |
          python3 -m pip install requests m3u8

      - name: 执行高清线路筛选脚本
        run: python3 merge_speed.py

      - name: 自动提交更新tv.txt
        run: |
          git config --global user.name "IPTV-Bot"
          git config --global user.email "bot@github.com"
          git add tv.txt
          # 无变更不提交，避免空提交记录
          git diff --quiet && git diff --staged || (git commit -m "自动刷新 咪咕/央视频优先 720P+线路" && git push)
