name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      - name: 目录校验
        run: ls -la

      - name: 执行分拣测速脚本
        run: |
          # 不使用外层timeout包裹，避免进程组残留
          PYTHONUNBUFFERED=1 python3 merge_speed.py
          # 强制同步磁盘文件
          sync
          # 主动查杀所有残留python后台子进程，消除Runner等待
          pkill -f python3 || true
          pkill -f curl || true
          pkill -f wget || true
          sync
          echo "脚本执行完毕，tv.txt文件校验："
          ls -lh tv.txt
          tail -5 tv.txt

      - name: 磁盘同步+git提交（独立60秒超时）
        timeout-minutes: 1
        run: |
          set -eo pipefail
          sync
          sleep 0.3
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet; then
            echo "tv.txt无更新，直接退出，跳过推送"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
          echo "====tv.txt推送仓库成功===="
