name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests

      - name: 执行分拣测速脚本，生成tv.txt
        timeout-minutes: 13
        run: |
          PYTHONUNBUFFERED=1 python3 merge_speed.py
          sync
          echo "Python业务执行完毕，等待所有python进程彻底销毁"
          WAIT_KILL=0
          while pgrep -f "python3 merge_speed.py" >/dev/null; do
            sleep 1
            WAIT_KILL=$((WAIT_KILL+1))
            echo "检测到残留python进程，继续等待回收..."
            # 等待90秒仍未退出，强制杀进程放行下一步
            if [ $WAIT_KILL -ge 90 ]; then
              pkill -f "python3 merge_speed.py" || true
              echo "等待超时，强制终止残留Python进程"
              break
            fi
          done
          sync
          echo "所有Python进程完全退出，本步骤结束"

      - name: 提交推送tv.txt文件（强制刷新时间，必推送）
        timeout-minutes: 3
        run: |
          set -eo pipefail
          sync
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."

          # 同步线上最新代码
          git fetch origin main
          git reset --hard origin/main
          sync

          # 强制写入全新时间戳，保证文件一定产生变更
          now=$(date "+%Y-%m-%d %H:%M:%S")
          echo -e "\n# 流水线自动刷新时间：${now}" >> tv.txt

          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表 强制刷新文件时间戳"
          git push origin main
          echo "文件强制推送完成，仓库tv.txt修改时间已更新"
