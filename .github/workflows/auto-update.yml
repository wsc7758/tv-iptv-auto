name: IPTV标准化流媒体分拣流水线
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: 拉取仓库完整代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 缓存Python依赖包，大幅减少安装耗时
      - name: 缓存pip依赖包
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements.txt') }}

      - name: 配置UTF-8系统编码，解决中文日志乱码
        run: |
          echo "LC_ALL=en_US.UTF-8" >> $GITHUB_ENV
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV

      # 修复：先自动创建目录再写入DNS配置，避免文件不存在报错
      - name: 配置国内公共DNS，优化国内源访问
        run: |
          sudo mkdir -p /etc/systemd/resolved.conf.d
          echo "nameserver 223.5.5.5" | sudo tee /etc/systemd/resolved.conf.d/dns.conf
          sudo systemctl restart systemd-resolved

      - name: 安装Python运行依赖（清华国内镜像）
        run: |
          python3 -m pip install --upgrade pip -i https://pypi.tuna.tsinghua.edu.cn/simple
          python3 -m pip install requests m3u8 -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: 列出当前目录所有文件，校验必备文件是否存在
        run: ls -la

      - name: 执行标准化分拣流水线 merge_speed.py（无缓冲实时日志）
        run: python3 -u merge_speed.py

      - name: 自动提交更新输出文件tv.txt
        run: |
          git config --global user.name "IPTV-Sort-Bot"
          git config --global user.email "auto-bot@example.com"
          git pull --rebase origin main
          git add tv.txt
          # 检查暂存区是否存在变更
          if git diff --cached --quiet; then
            echo "tv.txt无更新，跳过提交"
          else
            git commit -m "流水线自动更新｜优选测速直播源"
            git push origin main
          fi
