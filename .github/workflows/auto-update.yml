name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 第一步：纯运行Python，生成tv.txt，步骤结束环境全部销毁
      - name: 执行分拣测速脚本，生成tv.txt
        timeout-minutes: 10
        run: |
          PYTHONUNBUFFERED=1 python3 merge_speed.py
          sync
          echo "分拣完成，tv.txt已生成"

      # 第二步：全新干净shell，无任何Python残留，直接git推送
      - name: 提交推送tv.txt文件
        timeout-minutes: 3
        run: |
          set -eo pipefail
          sync
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet >/dev/null 2>&1; then
            echo "tv.txt无内容更新，任务正常结束"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
          echo "文件推送仓库完成"
