name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests

      - name: 执行分拣测速脚本，生成全新tv.txt
        timeout-minutes: 13
        run: |
          PYTHONUNBUFFERED=1 python3 -c "import merge_speed; print('【运行校验】MAX_STREAM_PER_CHANNEL =', merge_speed.MAX_STREAM_PER_CHANNEL)"
          PYTHONUNBUFFERED=1 python3 merge_speed.py
          sync
          echo "Python业务执行完毕，等待所有python进程彻底销毁"
          WAIT_KILL=0
          while pgrep -f "python3 merge_speed.py" >/dev/null; do
            sleep 1
            WAIT_KILL=$((WAIT_KILL+1))
            echo "检测到残留python进程，继续等待回收..."
            if [ $WAIT_KILL -ge 90 ]; then
              pkill -f "python3 merge_speed.py" || true
              echo "等待超时，强制终止残留Python进程"
              break
            fi
          done
          sync
          echo "所有Python进程完全退出，全新tv.txt已生成"
          # 在本次新生成文件末尾追加时间戳，制造提交变更
          now=$(date "+%Y-%m-%d %H:%M:%S")
          echo -e "\n# 流水线自动刷新时间：${now}" >> tv.txt

      - name: 提交推送tv.txt文件（保留分拣生成的全新文件）
        timeout-minutes: 3
        run: |
          set -eo pipefail
          sync
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          # 仅拉取远端，不重置覆盖本地新文件
          git fetch origin main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表 强制刷新文件时间戳"
          git push origin main
          echo "全新分拣后的tv.txt已推送至仓库"
