name: IPTV标准化流媒体分拣流水线
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - name: 拉取仓库完整代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 缓存pip依赖包
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements.txt') }}

      - name: 配置UTF-8系统编码，解决中文日志乱码
        run: |
          echo "LC_ALL=en_US.UTF-8" >> $GITHUB_ENV
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV

      - name: 配置国内公共DNS
        run: |
          sudo mkdir -p /etc/systemd/resolved.conf.d
          echo "nameserver 223.5.5.5" | sudo tee /etc/systemd/resolved.conf.d/dns.conf
          sudo systemctl restart systemd-resolved

      - name: 安装Python运行依赖（清华镜像+官方源兜底）
        run: |
          python3 -m pip install --upgrade pip -i https://pypi.tuna.tsinghua.edu.cn/simple
          python3 -m pip install requests m3u8 -i https://pypi.tuna.tsinghua.edu.cn/simple --extra-index-url https://pypi.org/simple

      - name: 列出当前目录文件校验
        run: ls -la

      # 拆分两段：python单独timeout；磁盘+git独立timeout，全程高频输出日志
      - name: 仅执行分拣脚本
        run: |
          PYTHONUNBUFFERED=1 timeout 900 python3 merge_speed.py
          echo "====分拣脚本执行完毕，文件已生成===="

      - name: 磁盘同步+git提交（单独60秒超时，每步打印日志）
        timeout-minutes: 2
        run: |
          set -eo pipefail
          echo "1. 开始磁盘同步"
          sync
          echo "2. 等待3秒释放文件锁"
          sleep 3
          echo "3. 配置git用户"
          git config --global user.name "IPTV-Sort-Bot"
          git config --global user.email "auto-bot@example.com"
          git add tv.txt
          echo "4. 判断文件是否变更"
          if git diff --cached --quiet; then
            echo "无更新，正常结束"
            exit 0
          fi
          echo "5. 拉取远端代码"
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          echo "6. 提交文件"
          git commit -m "流水线自动更新｜优选流媒体列表" || true
          echo "7. 推送仓库"
          git push origin main
          echo "====全部流程执行成功===="
