name: IPTV标准化流媒体分拣流水线
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - name: 拉取仓库完整代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 缓存pip依赖包
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements.txt') }}

      - name: 配置UTF-8系统编码，解决中文日志乱码
        run: |
          echo "LC_ALL=en_US.UTF-8" >> $GITHUB_ENV
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV

      - name: 配置国内公共DNS
        run: |
          sudo mkdir -p /etc/systemd/resolved.conf.d
          echo "nameserver 223.5.5.5" | sudo tee /etc/systemd/resolved.conf.d/dns.conf
          sudo systemctl restart systemd-resolved

      - name: 安装Python运行依赖（清华镜像+官方源兜底）
        run: |
          python3 -m pip install --upgrade pip -i https://pypi.tuna.tsinghua.edu.cn/simple
          python3 -m pip install requests m3u8 -i https://pypi.tuna.tsinghua.edu.cn/simple --extra-index-url https://pypi.org/simple

      - name: 列出当前目录文件校验
        run: ls -la

      # 唯一运行步骤：python分拣 → 多层同步等待 → git提交，全程同一个shell，无步骤切换阻塞
      - name: 执行分拣+磁盘等待+自动提交
        run: |
          set -e
          echo "===== 启动分拣脚本 ====="
          python3 -u merge_speed.py

          echo "===== 强制同步磁盘缓存 ====="
          sync
          sleep 4
          sync
          sleep 6
          sync
          sleep 2

          echo "===== 开始git提交逻辑 ====="
          git config --global user.name "IPTV-Sort-Bot"
          git config --global user.email "auto-bot@example.com"
          git add tv.txt
          if git diff --cached --quiet; then
            echo "tv.txt无更新，直接退出"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选测速直播源"
          git push origin main
          echo "===== 提交完成 ====="
